swagger: "2.0"

# ─────────────────────────────────────────────────────────────────────────────
# order-service — Swagger 2.0 Specification
#
# This is the Swagger 2.0 equivalent of examples/openapi.yaml.
# Sections marked [AGENT-GENERATED] show what the OAS Coverage Agent
# would produce when it encounters a repo using swagger: "2.0".
#
# Key structural differences from OAS 3.x:
#   - definitions (not components/schemas)
#   - parameters[in=body] (not requestBody)
#   - integer response codes (not quoted strings)
#   - x-nullable (not type: [string, null] or nullable: true)
#   - host + basePath (not servers[])
# ─────────────────────────────────────────────────────────────────────────────

info:
  title: Order Service API
  version: 1.4.0
  description: |
    Manages the full lifecycle of customer orders across Southeast Asian markets.
    Handles order creation, fulfilment routing, status tracking, and webhook
    delivery to downstream services.
  contact:
    name: Platform Engineering
    email: platform@company.com

host: api.company.com
basePath: /v1
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json

# ── Security ──────────────────────────────────────────────────────────────────

securityDefinitions:
  bearerAuth:
    type: apiKey
    in: header
    name: Authorization
    description: "JWT bearer token — format: Bearer <token>"

security:
  - bearerAuth: []

# ── Tags ──────────────────────────────────────────────────────────────────────

tags:
  - name: Orders
    description: Order lifecycle — create, read, update, cancel
  - name: Fulfilment
    description: Warehouse routing and delivery assignment
  - name: Webhooks
    description: Outbound event delivery to registered endpoints
  - name: Health
    description: Service health and readiness probes

# ── Definitions ───────────────────────────────────────────────────────────────
# NOTE: Swagger 2.0 uses `definitions`, not `components/schemas`

definitions:

  OrderStatus:
    type: string
    enum:
      - pending
      - confirmed
      - processing
      - shipped
      - delivered
      - cancelled
      - refunded

  Money:
    type: object
    required: [amount, currency]
    properties:
      amount:
        type: number
        format: double
        minimum: 0
        example: 49.90
      currency:
        type: string
        pattern: "^[A-Z]{3}$"
        example: SGD

  Address:
    type: object
    required: [line1, city, countryCode, postalCode]
    properties:
      line1:
        type: string
        maxLength: 255
      line2:
        type: string
        maxLength: 255
      city:
        type: string
      state:
        type: string
      countryCode:
        type: string
        pattern: "^[A-Z]{2}$"
        example: SG
      postalCode:
        type: string
        example: "018956"

  OrderItem:
    type: object
    required: [productId, sku, quantity, unitPrice]
    properties:
      productId:
        type: string
        format: uuid
      sku:
        type: string
        example: ELEC-HDPHN-BLK-L
      name:
        type: string
      quantity:
        type: integer
        minimum: 1
      unitPrice:
        $ref: '#/definitions/Money'
      discountAmount:
        $ref: '#/definitions/Money'

  Order:
    type: object
    required: [id, status, items, shippingAddress, subtotal, createdAt]
    properties:
      id:
        type: string
        format: uuid
      externalRef:
        type: string
        description: Caller-supplied idempotency key
        example: shopify-order-9128371
      status:
        $ref: '#/definitions/OrderStatus'
      items:
        type: array
        minItems: 1
        items:
          $ref: '#/definitions/OrderItem'
      shippingAddress:
        $ref: '#/definitions/Address'
      subtotal:
        $ref: '#/definitions/Money'
      shippingFee:
        $ref: '#/definitions/Money'
        x-nullable: true          # Swagger 2.0 nullable style
      tax:
        $ref: '#/definitions/Money'
        x-nullable: true
      total:
        $ref: '#/definitions/Money'
      fulfilmentWarehouseId:
        type: string
        format: uuid
        x-nullable: true
      trackingNumber:
        type: string
        x-nullable: true
      notes:
        type: string
        maxLength: 1000
        x-nullable: true
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
        x-nullable: true
      cancelledAt:
        type: string
        format: date-time
        x-nullable: true

  CreateOrderRequest:
    type: object
    required: [items, shippingAddress]
    properties:
      externalRef:
        type: string
        maxLength: 128
      items:
        type: array
        minItems: 1
        items:
          $ref: '#/definitions/OrderItem'
      shippingAddress:
        $ref: '#/definitions/Address'
      notes:
        type: string
        maxLength: 1000

  UpdateOrderRequest:
    type: object
    properties:
      shippingAddress:
        $ref: '#/definitions/Address'
      notes:
        type: string
        maxLength: 1000

  CancelOrderRequest:
    type: object
    required: [reason]
    properties:
      reason:
        type: string
        enum:
          - customer_request
          - inventory_unavailable
          - payment_failed
          - fraud_suspected
          - duplicate_order
      notes:
        type: string
        maxLength: 500

  FulfilmentRoute:
    type: object
    properties:
      orderId:
        type: string
        format: uuid
      warehouseId:
        type: string
        format: uuid
      warehouseName:
        type: string
      carrier:
        type: string
        x-nullable: true
      serviceLevel:
        type: string
        enum: [standard, express, same_day]
      estimatedShipDate:
        type: string
        format: date
        x-nullable: true
      estimatedDeliveryDate:
        type: string
        format: date
        x-nullable: true

  WebhookSubscription:
    type: object
    properties:
      id:
        type: string
        format: uuid
      url:
        type: string
        format: uri
      events:
        type: array
        items:
          type: string
      active:
        type: boolean
      createdAt:
        type: string
        format: date-time

  CreateWebhookRequest:
    type: object
    required: [url, events]
    properties:
      url:
        type: string
        format: uri
      events:
        type: array
        minItems: 1
        items:
          type: string
          enum:
            - order.created
            - order.confirmed
            - order.shipped
            - order.delivered
            - order.cancelled
      secret:
        type: string
        minLength: 32

  PaginatedOrders:
    type: object
    properties:
      data:
        type: array
        items:
          $ref: '#/definitions/Order'
      pagination:
        type: object
        properties:
          total:
            type: integer
          page:
            type: integer
          pageSize:
            type: integer
          hasNext:
            type: boolean
          cursor:
            type: string
            x-nullable: true

  ErrorResponse:
    type: object
    required: [code, message]
    properties:
      code:
        type: string
        example: ORDER_NOT_FOUND
      message:
        type: string
      traceId:
        type: string
        format: uuid
        x-nullable: true

  HealthStatus:
    type: object
    properties:
      status:
        type: string
        enum: [ok, degraded, unavailable]
      version:
        type: string
        example: 1.4.0
      uptime:
        type: integer

# ── Paths ─────────────────────────────────────────────────────────────────────
# NOTE: response codes are integers in Swagger 2.0 (not quoted strings)
# NOTE: request body uses parameters[in=body] (not requestBody:)

paths:

  # ── /health ──────────────────────────────────────────────── [AGENT-GENERATED]
  /health:
    get:
      operationId: getHealth
      summary: Liveness probe
      description: Returns service health status. No authentication required.
      tags: [Health]
      security: []
      parameters:
        - name: X-Correlation-ID
          in: header
          required: false
          type: string
          format: uuid
      responses:
        200:
          description: Service is healthy
          schema:
            $ref: '#/definitions/HealthStatus'
        503:
          description: Service is unavailable
          schema:
            $ref: '#/definitions/HealthStatus'

  # ── /ready ───────────────────────────────────────────────── [AGENT-GENERATED]
  /ready:
    get:
      operationId: getReadiness
      summary: Readiness probe
      description: Confirms the service is ready to accept traffic.
      tags: [Health]
      security: []
      responses:
        200:
          description: Service is ready
          schema:
            type: object
            properties:
              ready:
                type: boolean
        503:
          description: Service is not ready
          schema:
            type: object
            properties:
              ready:
                type: boolean
              reason:
                type: string

  # ── /orders ──────────────────────────────────────────────────────────────────
  /orders:

    # [HAND-AUTHORED]
    get:
      operationId: listOrders
      summary: List orders
      description: Returns a paginated list of orders for the authenticated caller.
      tags: [Orders]
      parameters:
        - name: X-Market-Code
          in: header
          required: true
          type: string
          enum: [SG, ID, PH]
        - name: X-Correlation-ID
          in: header
          required: false
          type: string
          format: uuid
        - name: status
          in: query
          type: string
          enum: [pending, confirmed, processing, shipped, delivered, cancelled, refunded]
        - name: from
          in: query
          type: string
          format: date
        - name: to
          in: query
          type: string
          format: date
        - name: page
          in: query
          type: integer
          minimum: 1
          default: 1
        - name: pageSize
          in: query
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      responses:
        200:
          description: Paginated order list
          schema:
            $ref: '#/definitions/PaginatedOrders'
        401:
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'

    # [HAND-AUTHORED]
    post:
      operationId: createOrder
      summary: Create order
      description: Creates a new order. Supply externalRef for idempotent submission.
      tags: [Orders]
      parameters:
        - name: X-Market-Code
          in: header
          required: true
          type: string
          enum: [SG, ID, PH]
        - name: X-Correlation-ID
          in: header
          required: false
          type: string
          format: uuid
        - name: body                  # Swagger 2.0: body parameter (not requestBody)
          in: body
          required: true
          schema:
            $ref: '#/definitions/CreateOrderRequest'
      responses:
        201:
          description: Order created
          schema:
            $ref: '#/definitions/Order'
        200:
          description: Duplicate — original order returned
          schema:
            $ref: '#/definitions/Order'
        401:
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        422:
          description: Validation error
          schema:
            $ref: '#/definitions/ErrorResponse'

  # ── /orders/{orderId} ────────────────────────────────────────────────────────
  /orders/{orderId}:

    parameters:
      - name: orderId
        in: path
        required: true
        type: string
        format: uuid
      - name: X-Correlation-ID
        in: header
        required: false
        type: string
        format: uuid

    # [HAND-AUTHORED]
    get:
      operationId: getOrder
      summary: Get order by ID
      tags: [Orders]
      responses:
        200:
          description: Order found
          schema:
            $ref: '#/definitions/Order'
        401:
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        404:
          description: Not found
          schema:
            $ref: '#/definitions/ErrorResponse'

    # [AGENT-GENERATED]
    patch:
      operationId: updateOrder
      summary: Update order
      description: Partially updates a pending order. Only orders in pending status can be updated.
      tags: [Orders]
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/UpdateOrderRequest'
      responses:
        200:
          description: Order updated
          schema:
            $ref: '#/definitions/Order'
        401:
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        404:
          description: Not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        409:
          description: Order is not in a state that allows updates
          schema:
            $ref: '#/definitions/ErrorResponse'
        422:
          description: Validation error
          schema:
            $ref: '#/definitions/ErrorResponse'

    # [AGENT-GENERATED]
    delete:
      operationId: deleteOrder
      summary: Hard-delete order (internal)
      description: Permanently deletes an order record. Internal service accounts only.
      tags: [Orders]
      responses:
        204:
          description: Deleted
        401:
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        403:
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        404:
          description: Not found
          schema:
            $ref: '#/definitions/ErrorResponse'

  # ── /orders/{orderId}/cancel ─────────────────────────────── [AGENT-GENERATED]
  /orders/{orderId}/cancel:
    parameters:
      - name: orderId
        in: path
        required: true
        type: string
        format: uuid

    post:
      operationId: cancelOrder
      summary: Cancel order
      description: Transitions a pending or confirmed order to cancelled status.
      tags: [Orders]
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/CancelOrderRequest'
      responses:
        200:
          description: Order cancelled
          schema:
            $ref: '#/definitions/Order'
        404:
          description: Not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        409:
          description: Order is not in a cancellable state
          schema:
            $ref: '#/definitions/ErrorResponse'

  # ── /orders/{orderId}/fulfilment ─────────────────────────── [AGENT-GENERATED]
  /orders/{orderId}/fulfilment:
    parameters:
      - name: orderId
        in: path
        required: true
        type: string
        format: uuid

    get:
      operationId: getFulfilmentRoute
      summary: Get fulfilment routing
      description: Returns warehouse assignment and estimated delivery for a confirmed order.
      tags: [Fulfilment]
      responses:
        200:
          description: Fulfilment route
          schema:
            $ref: '#/definitions/FulfilmentRoute'
        404:
          description: Not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        409:
          description: Order not yet confirmed
          schema:
            $ref: '#/definitions/ErrorResponse'

  # ── /orders/{orderId}/status ─────────────────────────────── [AGENT-GENERATED]
  /orders/{orderId}/status:
    parameters:
      - name: orderId
        in: path
        required: true
        type: string
        format: uuid

    get:
      operationId: getOrderStatus
      summary: Get order status
      description: Lightweight status endpoint for high-frequency polling.
      tags: [Orders]
      responses:
        200:
          description: Order status
          schema:
            type: object
            properties:
              orderId:
                type: string
                format: uuid
              status:
                $ref: '#/definitions/OrderStatus'
              trackingNumber:
                type: string
                x-nullable: true
              updatedAt:
                type: string
                format: date-time
        404:
          description: Not found
          schema:
            $ref: '#/definitions/ErrorResponse'

    put:
      operationId: setOrderStatus
      summary: Force-set order status (internal)
      description: Directly sets order status. Internal use only. Requires orders:admin scope.
      tags: [Orders]
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required: [status]
            properties:
              status:
                $ref: '#/definitions/OrderStatus'
              trackingNumber:
                type: string
              notes:
                type: string
      responses:
        200:
          description: Status updated
          schema:
            $ref: '#/definitions/Order'
        401:
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        403:
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        404:
          description: Not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        422:
          description: Validation error
          schema:
            $ref: '#/definitions/ErrorResponse'

  # ── /webhooks ────────────────────────────────────────────── [AGENT-GENERATED]
  /webhooks:
    get:
      operationId: listWebhooks
      summary: List webhook subscriptions
      tags: [Webhooks]
      responses:
        200:
          description: Webhook list
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/definitions/WebhookSubscription'

    post:
      operationId: createWebhook
      summary: Create webhook subscription
      tags: [Webhooks]
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/CreateWebhookRequest'
      responses:
        201:
          description: Webhook created
          schema:
            $ref: '#/definitions/WebhookSubscription'
        422:
          description: Validation error
          schema:
            $ref: '#/definitions/ErrorResponse'

  # ── /webhooks/{webhookId} ────────────────────────────────── [AGENT-GENERATED]
  /webhooks/{webhookId}:
    parameters:
      - name: webhookId
        in: path
        required: true
        type: string
        format: uuid

    delete:
      operationId: deleteWebhook
      summary: Delete webhook subscription
      tags: [Webhooks]
      responses:
        204:
          description: Deleted
        404:
          description: Not found
          schema:
            $ref: '#/definitions/ErrorResponse'
